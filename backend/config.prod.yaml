env: local
port: 1234
pprof:
  enable: true
  portPprof: 6060
autoLogout: false
autoDisconnect: false
proxy:
  enable: true
  directory: ./webshare_10_proxies.txt
startUp:
  enableAutoLogin: true
shutDown:
  enableAutoShutDown: false
messageStatus:
  enable: false
  baseUrl: https://sms.mobiledata.id
  updateMessageStatus: wa/masking/golang/update_status.php
cronjob:
  autoPresence:
    enable: false
    cronJobSchedule: "0 0 * * 0"
deleteAfterSend:
  enable: false
bulkSend:
  minDelay: 20000
  maxDelay: 60000
  batchSize: 8
  batchPauseMin: 360
  batchPauseMax: 720
  dailyLimit: 40
  typingDelayMin: 2500
  typingDelayMax: 6000
  enablePresenceSimulation: true
  # NEW ANTI-BAN FEATURES:
  allowedHourStart: 8
  allowedHourEnd: 22
  timezone: "Asia/Jakarta"
  enableTimeRestrictions: true
  errorBackoffMinutes: 30
  enableRecipientValidation: true
  validationCacheDuration: 24
  enableHealthCheck: true
  maxErrorRate: 0.3
postgres:
  dbName: coba_baru_whatsapp
  host: localhost
  password: postgres
  port: 5432
  schema: public
  user: postgres
  enablePostgres: true
