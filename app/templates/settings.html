{{define "title"}}Settings - Change Password{{end}}

{{define "content"}}
<div class="px-4 py-8"> <!-- container and mx-auto removed for consistency -->
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Settings</h1>

    <div class="card max-w-lg mx-auto"> <!-- Added mx-auto to center the card -->
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Change Your Password (HTMX)</h2>

        <!-- Target for HTMX response -->
        <div id="message-area">
            {{if .Message}}
            <div class="mb-4 p-3 rounded {{if .Error}}bg-red-100 text-red-700{{else}}bg-green-100 text-green-700{{end}}">
                {{.Message}}
            </div>
            {{end}}
        </div>

        <form hx-post="/settings/password" hx-target="#message-area" hx-swap="innerHTML">
            <div class="mb-4">
                <label for="current_password" class="block text-sm font-medium text-gray-700">Current Password</label>
                <input type="password" name="current_password" id="current_password" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <div class="mb-4">
                <label for="new_password" class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" name="new_password" id="new_password" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <div class="mb-6">
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <div>
                <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Change Password
                </button>
            </div>
        </form>
    </div>
</div>
{{end}}
